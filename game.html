<!doctype html>
<html lang="en">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" type="text/css">
</head>

<body>

    <main>
        <div class="game-screen d-flex flex-column justify-content-center align-items-center">

            <div class="game-cube pixel-corners d-flex justify-content-center align-items-center flex-column">

                <h3 class="fs-1">I am thinking of a Number Between 1 - 100 .</h3>
                
                <h3 class="text-center fs-1">Can you guess it❔❓</h3>

                <form id="guessForm" class=" d-flex  justify-content-center align-items-center">

                    <input type="number" placeholder="Enter" class="form-control mt-5 btn-corner" id="guess">

                    <button class="btn btn-dark btn-corner p-2 px-4 mt-5 ms-4" type="submit">guess</button>

                    <button class="btn btn-success btn-corner p-2 px-4 mt-5 ms-4 d-none " type="reset">reset</button>

                </form>

                <div id="count" class="mt-2 fs-5"></div>
                <div id="gusses" class="mt-2 fs-5"></div>

                <div id="message" class="mt-3 "></div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script src="./index.js"></script>
</body>

</html>
